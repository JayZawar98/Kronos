<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Kronos · Virtual Broker</title>
  <meta name="description" content="AI-powered Virtual Broker Dashboard" />
  <meta name="theme-color" content="#000000" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

<style>
/* ── Reset & Base ───────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:         #000;
  --surface:    #0d0d0d;
  --surface2:   #161616;
  --border:     #222;
  --text:       #f0f0f0;
  --muted:      #666;
  --muted2:     #444;
  --buy:        #30d97c;
  --sell:       #f26060;
  --mono:       'JetBrains Mono', monospace;
  --sans:       'Inter', sans-serif;
  --r:          14px;
  --r-sm:       8px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

html { height: 100%; }
body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  min-height: 100%;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

/* ── Scrollbar (desktop) ────────────────────────────────────────────── */
::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* ── Header ─────────────────────────────────────────────────────────── */
header {
  position: sticky; top: 0; z-index: 100;
  background: rgba(0,0,0,0.85);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  padding: 14px 20px 14px;
  padding-top: calc(14px + env(safe-area-inset-top, 0px));
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  gap: 12px;
}

.logo {
  display: flex; align-items: center; gap: 8px;
  font-size: 1rem; font-weight: 700;
  letter-spacing: -0.03em;
}
.logo svg { color: #fff; flex-shrink: 0; }

.hdr-equity {
  display: flex; flex-direction: column; align-items: flex-end;
}
.hdr-equity-label { font-size: 0.6rem; color: var(--muted); font-weight: 500; text-transform: uppercase; letter-spacing: 0.08em; }
.hdr-equity-val   { font-family: var(--mono); font-size: 0.95rem; font-weight: 600; color: var(--text); }

/* ── Page Body ──────────────────────────────────────────────────────── */
.page {
  padding: 20px 16px;
  padding-bottom: calc(100px + var(--safe-bottom));
  max-width: 1400px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  gap: 24px;
}

/* ── Metric cards ───────────────────────────────────────────────────── */
.metrics {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.metric-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.metric-card.full { grid-column: 1 / -1; }

.metric-label {
  font-size: 0.65rem; font-weight: 500;
  text-transform: uppercase; letter-spacing: 0.08em;
  color: var(--muted);
}
.metric-val {
  font-family: var(--mono);
  font-size: 1.6rem; font-weight: 600;
  line-height: 1;
  color: var(--text);
}
.metric-sub {
  font-size: 0.7rem; color: var(--muted); font-family: var(--mono);
  margin-top: 2px;
}
.metric-badge {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 0.7rem; font-family: var(--mono); font-weight: 500;
  padding: 2px 8px; border-radius: 99px;
  background: rgba(48,217,124,0.1); color: var(--buy);
  border: 1px solid rgba(48,217,124,0.25);
}
.metric-badge.neg {
  background: rgba(242,96,96,0.1); color: var(--sell);
  border-color: rgba(242,96,96,0.25);
}

/* ── Section header ─────────────────────────────────────────────────── */
.section-hdr {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 10px;
}
.section-title {
  font-size: 0.7rem; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.08em;
  color: var(--muted);
}
.section-count {
  font-size: 0.7rem; font-family: var(--mono); color: var(--muted2);
}

/* ── Position cards ─────────────────────────────────────────────────── */
.positions-list {
  display: flex; flex-direction: column; gap: 8px;
}

.position-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  padding: 14px 16px;
  display: grid;
  grid-template-columns: 1fr auto;
  grid-template-rows: auto auto;
  gap: 4px 8px;
  align-items: center;
}

.pos-symbol   { font-weight: 600; font-size: 0.9rem; color: var(--text); }
.pos-side {
  font-family: var(--mono); font-size: 0.7rem; font-weight: 600;
  padding: 2px 8px; border-radius: 99px;
  justify-self: end;
}
.pos-side.BUY  { background: rgba(48,217,124,0.12); color: var(--buy); border: 1px solid rgba(48,217,124,0.25); }
.pos-side.SELL { background: rgba(242,96,96,0.12); color: var(--sell); border: 1px solid rgba(242,96,96,0.25); }

.pos-meta {
  font-size: 0.72rem; color: var(--muted); font-family: var(--mono);
  grid-column: 1 / -1;
  line-height: 1.4;
}

.empty-state {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  padding: 24px 16px;
  text-align: center;
  color: var(--muted);
  font-size: 0.82rem;
}

/* ── Category Layout (Responsive Grid) ──────────────────────────────── */
.categories-container {
  display: grid;
  grid-template-columns: 1fr;
  gap: 24px;
}

@media (min-width: 800px) {
  .categories-container {
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    align-items: start;
  }
}

.category-block {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 16px;
  display: flex;
  flex-direction: column;
}

.category-title {
  font-size: 0.8rem; font-weight: 600; text-transform: uppercase;
  letter-spacing: 0.05em; color: var(--text); margin-bottom: 14px;
  display: flex; align-items: center; gap: 6px;
  border-bottom: 1px solid var(--border);
  padding-bottom: 8px;
}

.carousel-track {
  display: flex; flex-direction: column; gap: 12px;
}

.carousel-card {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  padding: 14px 16px;
  display: flex; flex-direction: column; gap: 6px;
  transition: transform 0.2s, border-color 0.2s;
}
.carousel-card:hover {
  border-color: var(--muted2);
  transform: translateY(-2px);
}
.carousel-header {
  display: flex; justify-content: space-between; align-items: center;
}
.carousel-card.empty {
  justify-content: center; align-items: center; text-align: center;
  color: var(--muted); font-style: italic; font-size: 0.8rem;
  padding: 24px 16px;
  background: transparent; border: 1px dashed var(--border);
}

/* ── Trade history rows ─────────────────────────────────────────────── */
.trade-list {
  display: flex; flex-direction: column; gap: 6px;
  max-height: 400px;
  overflow-y: auto;
  padding-right: 4px;
}

.trade-list::-webkit-scrollbar { width: 4px; }
.trade-list::-webkit-scrollbar-track { background: transparent; }
.trade-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.trade-row {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  padding: 12px 16px;
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 4px 8px;
  align-items: center;
}

.trade-symbol { font-weight: 600; font-size: 0.85rem; }
.trade-pnl {
  font-family: var(--mono); font-size: 0.9rem; font-weight: 600;
  justify-self: end;
}
.trade-pnl.up   { color: var(--buy); }
.trade-pnl.down { color: var(--sell); }

.trade-meta {
  font-size: 0.68rem; color: var(--muted); font-family: var(--mono);
  grid-column: 1 / -1;
}

/* ── Floating daemon bar ────────────────────────────────────────────── */
.fab-bar {
  position: fixed;
  bottom: calc(16px + var(--safe-bottom));
  left: 50%; transform: translateX(-50%);
  z-index: 200;
  display: flex; align-items: center; gap: 12px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 99px;
  padding: 12px 20px;
  box-shadow: 0 8px 40px rgba(0,0,0,0.7);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  cursor: pointer;
  user-select: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.fab-bar:hover { border-color: var(--muted2); }

.fab-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--muted);
  transition: background 0.3s;
  flex-shrink: 0;
}
.fab-dot.active {
  background: var(--buy);
  box-shadow: 0 0 8px var(--buy);
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { box-shadow: 0 0 8px var(--buy); }
  50%       { box-shadow: 0 0 14px var(--buy); }
}

.fab-label {
  font-size: 0.82rem; font-weight: 500; color: var(--muted);
  white-space: nowrap;
}
.fab-status {
  font-size: 0.82rem; font-weight: 600; color: var(--text);
  font-family: var(--mono);
  white-space: nowrap;
}

/* ── Toast ──────────────────────────────────────────────────────────── */
#toast {
  position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(10px);
  padding: 10px 18px; border-radius: 99px;
  background: var(--text); color: var(--bg);
  font-size: 0.78rem; font-weight: 500;
  opacity: 0; transition: all .2s; z-index: 999;
  pointer-events: none; white-space: nowrap;
}
#toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
#toast.err  { background: var(--sell); color: #000; }
#toast.ok   { background: var(--buy); color: #000; }

/* ── Desktop tweaks (keep it comfortable wide-screen too) ───────────── */
@media (min-width: 600px) {
  .page { padding: 32px 24px 120px; }
  .metric-val { font-size: 2rem; }
  header { padding: 16px 32px; }
}
</style>
</head>
<body>

<div id="toast"></div>

<!-- Header -->
<header>
  <div class="logo">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
    </svg>
    Kronos
  </div>
  <div class="hdr-equity">
    <span class="hdr-equity-label">Total Equity</span>
    <span class="hdr-equity-val" id="hdr-equity">—</span>
  </div>
</header>

<!-- Page content -->
<div class="page">

  <!-- Metrics -->
  <div class="metrics">
    <div class="metric-card full">
      <div class="metric-label">Account Balance</div>
      <div class="metric-val" id="port-equity">—</div>
      <div class="metric-sub" id="port-equity-sub"></div>
    </div>
    <div class="metric-card">
      <div class="metric-label">Available Cash</div>
      <div class="metric-val" id="port-cash" style="font-size:1.2rem">—</div>
    </div>
    <div class="metric-card">
      <div class="metric-label">Active Trades</div>
      <div class="metric-val" id="port-open-count" style="font-size:1.2rem">—</div>
    </div>
  </div>

  <!-- Open Positions -->
  <div>
    <div class="section-hdr">
      <span class="section-title">Active Trades (Currently in market)</span>
      <span class="section-count" id="pos-count"></span>
    </div>
    <div class="positions-list" id="pos-list">
      <div class="empty-state">No active trades</div>
    </div>
  </div>

  <!-- Trade History -->
  <div>
    <div class="section-hdr">
      <span class="section-title">Completed Trades (Past results)</span>
      <span class="section-count" id="hist-count"></span>
    </div>
    <div class="trade-list" id="hist-list">
      <div class="empty-state">No trades yet</div>
    </div>
  </div>

</div>

<!-- Floating daemon toggle bar -->
<div class="fab-bar" id="fab-bar" role="button" aria-label="Toggle Auto-Trading">
  <div class="fab-dot" id="fab-dot"></div>
  <span class="fab-label">Auto-Trading</span>
  <span class="fab-status" id="fab-status">OFF</span>
</div>

<script>
let daemonEnabled = false;

function toast(msg, type = "info") {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.className = `show ${type === "error" ? "err" : type === "ok" ? "ok" : ""}`;
  setTimeout(() => { el.className = ""; }, 3000);
}

async function api(path, body) {
  const opts = body
    ? { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) }
    : {};
  const r = await fetch(path, opts);
  return r.json();
}

// Daemon toggle via the fab bar
document.getElementById("fab-bar").addEventListener("click", async () => {
  const next = !daemonEnabled;
  const res = await api("/api/daemon/toggle", { enabled: next });
  if (res.status === "ok") {
    setDaemonUI(res.daemon_enabled);
    toast(`Auto-trading ${res.daemon_enabled ? "enabled" : "disabled"}`, "ok");
  }
});

function setDaemonUI(enabled) {
  daemonEnabled = enabled;
  const dot    = document.getElementById("fab-dot");
  const status = document.getElementById("fab-status");
  if (enabled) {
    dot.classList.add("active");
    status.textContent = "ON";
    status.style.color = "var(--buy)";
  } else {
    dot.classList.remove("active");
    status.textContent = "OFF";
    status.style.color = "var(--muted)";
  }
}

function fmt(n)    { return (n != null) ? n.toLocaleString("en-US", { maximumFractionDigits: 2 }) : "—"; }
function fmtCur(n) { return (n != null) ? "₹" + n.toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 }) : "—"; }

async function loadPortfolio() {
  const res = await api("/api/portfolio");
  if (res.status !== "ok") return;

  setDaemonUI(res.daemon_enabled);

  const equity = res.portfolio.total_equity;
  const cash   = res.portfolio.cash_balance;
  const pnl    = equity - 10000; // vs. initial ₹10k
  const pnlPct = ((pnl / 10000) * 100).toFixed(2);
  const pnlPos = pnl >= 0;

  document.getElementById("hdr-equity").textContent    = fmtCur(equity);
  document.getElementById("port-equity").textContent   = fmtCur(equity);
  document.getElementById("port-cash").textContent     = fmtCur(cash);
  document.getElementById("port-open-count").textContent = res.positions.length;

  // PnL sub-label under total equity
  const sub = document.getElementById("port-equity-sub");
  sub.innerHTML = `
    <span style="color:${pnlPos ? 'var(--buy)' : 'var(--sell)'}; font-family:var(--mono); font-size:0.78rem;">
      <strong style="text-transform:uppercase;">${pnlPos ? "PROFIT" : "LOSS"}</strong>: ${pnlPos ? "+" : ""}${fmtCur(pnl)} (${pnlPos ? "+" : ""}${pnlPct}%) vs starting capital
    </span>`;

  // Categories Config
  const CATEGORY_MAP = {
    "india_large": "🔵 India Large Cap",
    "india_mid": "🟡 India Mid Cap",
    "india_small": "🔴 India Small Cap",
    "crypto_large": "🌍 Crypto",
    "crypto_mid": "🌍 Crypto",
    "us_large": "🇺🇸 US Stocks",
    "unknown": "⚪ Other"
  };
  const ORDER = ["🔵 India Large Cap", "🟡 India Mid Cap", "🔴 India Small Cap", "🇺🇸 US Stocks", "🌍 Crypto", "⚪ Other"];

  // Helper to group arrays by mapped category
  function groupByCategory(items) {
    const groups = {};
    ORDER.forEach(c => groups[c] = []);
    items.forEach(item => {
      const c = CATEGORY_MAP[item.category] || "⚪ Other";
      if (!groups[c]) groups[c] = [];
      groups[c].push(item);
    });
    return groups;
  }

  // --- Render Positions (Carousel) ---
  const posList  = document.getElementById("pos-list");
  const posCount = document.getElementById("pos-count");
  posCount.textContent = res.positions.length ? `${res.positions.length} active` : "";
  
  if (res.positions.length > 0) {
    const posGroups = groupByCategory(res.positions);
    let html = `<div class="categories-container">`;
    ORDER.forEach(catName => {
      const items = posGroups[catName];
      if (items && items.length > 0) {
        html += `<div class="category-block">
          <div class="category-title">${catName}</div>
          <div class="carousel-track">`;
        items.forEach(p => {
          const invested = p.quantity * p.entry_price;
          const peak = p.peak_price || p.entry_price;
          const peakDiff = ((peak - p.entry_price) / p.entry_price * 100).toFixed(2);
          html += `
            <div class="carousel-card">
              <div class="carousel-header">
                <span class="pos-symbol">${p.symbol}</span>
                <span class="pos-side ${p.side}">${p.side}</span>
              </div>
              <span class="pos-meta">
                Invested <strong>${fmtCur(invested)}</strong><br>
                Bought ${p.quantity} at ${fmtCur(p.entry_price)}<br>
                Peak: ${fmtCur(peak)} (+${peakDiff}%)
              </span>
            </div>`;
        });
        html += `</div></div>`;
      }
    });
    html += `</div>`;
    posList.innerHTML = html;
  } else {
    posList.innerHTML = '<div class="empty-state">No active trades</div>';
  }

  // --- Render History (Grouped & Chronological) ---
  const histList  = document.getElementById("hist-list");
  const histCount = document.getElementById("hist-count");
  histCount.textContent = res.history.length ? `${res.history.length} trades` : "";
  
  if (res.history.length > 0) {
    // newest first (latest to oldest)
    const sorted = [...res.history].reverse();
    const histGroups = groupByCategory(sorted);
    let html = `<div class="categories-container">`;
    
    ORDER.forEach(catName => {
      const items = histGroups[catName];
      if (items && items.length > 0) {
        html += `<div class="category-block">
          <div class="category-title">${catName}</div>
          <div class="trade-list" style="max-height: 400px;">`;
        items.forEach(h => {
          const up = h.pnl >= 0;
          const invested = h.quantity * h.entry_price;
          html += `
            <div class="trade-row">
              <span class="trade-symbol">${h.symbol}</span>
              <span class="trade-pnl ${up ? 'up' : 'down'}">${up ? "+" : ""}${fmtCur(h.pnl)}</span>
              <span class="trade-meta">
                Invested <strong>${fmtCur(invested)}</strong> · Sold at ${fmtCur(h.exit_price)}<br>
                <strong class="${up ? 'up' : 'down'}">${up ? "PROFIT" : "LOSS"} of ${up ? "+" : ""}${h.pnl_percent.toFixed(2)}%</strong>
              </span>
            </div>`;
        });
        html += `</div></div>`;
      }
    });
    html += `</div>`;
    histList.innerHTML = html;
  } else {
    histList.innerHTML = '<div class="empty-state">No trades yet</div>';
  }
}

loadPortfolio();
setInterval(loadPortfolio, 10000);
</script>
</body>
</html>
